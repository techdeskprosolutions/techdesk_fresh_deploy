version: '3.8'

# =====================================================
# homelab-core - Base Docker Compose
# NPM + MariaDB + phpMyAdmin + wg-easy + Landing Page
#
# Pre-configured domains (create these proxy hosts in NPM after first launch):
#   • panel.techdeskpro.com          → Landing page (simple welcome page)
#   • npm.panel.techdeskpro.com      → Nginx Proxy Manager Admin UI
#   • db.panel.techdeskpro.com       → phpMyAdmin
#   • vpn.panel.techdeskpro.com      → WireGuard VPN Web UI
#
# All sensitive values loaded from .env
# =====================================================

services:
  # Nginx Proxy Manager (Reverse Proxy + SSL)
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP (Let’s Encrypt + redirects)
      - "443:443"   # HTTPS
      - "81:81"     # Admin UI (temporary – proxy it later)
    volumes:
      - ./data/npm:/data
      - ./data/npm/letsencrypt:/etc/letsencrypt
    networks:
      - homelab-proxy

  # MariaDB Database (backend only – never expose publicly)
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      # MYSQL_DATABASE: ${DB_NAME:-homelab}   # Uncomment + add to .env if you want a DB created automatically
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - homelab-backend

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    depends_on:
      - mariadb
    networks:
      - homelab-backend
      - homelab-proxy   # so NPM can reach it by container name

  # wg-easy – WireGuard VPN + Web UI
  # Uses plain-text password from .env via unattended setup (no manual hash needed)
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    environment:
      - WG_HOST=${WG_HOST}               # Public hostname/IP clients will connect to
      - INIT_ENABLED=true
      - INIT_USERNAME=admin              # Default admin user
      - INIT_PASSWORD=${VPN_UI_PASSWORD} # ← Plain password from .env (set once on first start)
      - PORT=51821                       # Web UI internal port
      - WG_PORT=51820
      # Optional extras you can uncomment:
      # - WG_DEFAULT_ADDRESS=10.8.0.x
      # - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
    ports:
      - "51820:51820/udp"   # VPN tunnel (forward this on your router)
    volumes:
      - ./data/wg-easy:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - homelab-proxy

  # Simple landing page for the root domain panel.techdeskpro.com
  landing:
    image: nginx:alpine
    container_name: landing
    restart: unless-stopped
    volumes:
      - ./data/landing:/usr/share/nginx/html:ro
    networks:
      - homelab-proxy

# =====================================================
# Networks
# =====================================================
networks:
  homelab-proxy:
    name: homelab-proxy
    driver: bridge
  homelab-backend:
    name: homelab-backend
    driver: bridge
