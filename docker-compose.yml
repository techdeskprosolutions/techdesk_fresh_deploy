version: '3.8'

# =====================================================
# TechDesk Homelab Core - Folder-based landing page
# Ready for GitHub + Hostinger Docker Manager
# =====================================================

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - letsencrypt_data:/etc/letsencrypt
    networks:
      - homelab-proxy

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - homelab-backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    depends_on:
      - mariadb
    networks:
      - homelab-backend
      - homelab-proxy

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    environment:
      WG_HOST: ${WG_HOST}
      INIT_ENABLED: "true"
      INIT_USERNAME: admin
      INIT_PASSWORD: ${VPN_UI_PASSWORD}
      PORT: 51821
      WG_PORT: 51820
    ports:
      - "51820:51820/udp"
    volumes:
      - wg_easy_data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - homelab-proxy

  # ✅ Landing page now uses real folder (easy to expand)
  landing:
    image: nginx:alpine
    container_name: landing
    restart: unless-stopped
    volumes:
      - ./panel.techdeskpro.com/public:/usr/share/nginx/html:ro
    networks:
      - homelab-proxy

networks:
  homelab-proxy:
    name: homelab-proxy
    driver: bridge
  homelab-backend:
    name: homelab-backend
    driver: bridge

volumes:
  npm_data:
  letsencrypt_data:
  mariadb_data:
  wg_easy_data:
